<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #666;
  --border: #e8e8e8;
  --primary: #4f6ef7;
  --primary-light: #e8edff;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 12px;
  --nav-height: 60px;
}
[data-theme="dark"] {
  --bg: #0d1117;
  --card-bg: #161b22;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --border: #30363d;
  --primary: #58a6ff;
  --primary-light: #1a2332;
  --shadow: 0 2px 12px rgba(0,0,0,0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

/* 顶部导航栏 */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  height: var(--nav-height);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
}
.navbar .logo {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  white-space: nowrap;
  cursor: pointer;
}
.navbar .search-box {
  flex: 1;
  max-width: 500px;
  position: relative;
}
.navbar .search-box input {
  width: 100%;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 0 20px 0 44px;
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.navbar .search-box input:focus {
  border-color: var(--primary);
}
.navbar .search-box .search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  opacity: 0.5;
}
.navbar .theme-toggle {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: 0.2s;
  flex-shrink: 0;
}
.navbar .theme-toggle:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.navbar .stats {
  font-size: 13px;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* 主内容区 */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* 页面切换 */
.page { display: none; }
.page.active { display: block; }

/* 分类网格 */
.category-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.category-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 24px 20px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.category-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
}
.category-card .cat-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 12px;
}
.category-card .cat-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}
.category-card .cat-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.category-card .cat-count {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--primary-light);
  padding: 2px 10px;
  border-radius: 10px;
}

/* 分类详情页 */
.category-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.back-btn {
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--card-bg);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: 0.2s;
  flex-shrink: 0;
}
.back-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.category-title {
  display: flex;
  align-items: center;
  gap: 12px;
}
.category-title .cat-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.category-title h2 {
  font-size: 20px;
  font-weight: 700;
}
.category-title p {
  font-size: 13px;
  color: var(--text-secondary);
}

/* 工具列表 */
.sites-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.site-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.site-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
  border-color: var(--primary);
}
.site-card .site-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}
.site-card .site-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.site-card .site-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 8px;
  white-space: nowrap;
  flex-shrink: 0;
}
.site-card .site-badge.free {
  background: #e8f5e9;
  color: #2e7d32;
}
.site-card .site-badge.freemium {
  background: #fff3e0;
  color: #e65100;
}
.site-card .site-badge.paid {
  background: #fce4ec;
  color: #c62828;
}
[data-theme="dark"] .site-card .site-badge.free {
  background: #1b3a1b;
  color: #66bb6a;
}
[data-theme="dark"] .site-card .site-badge.freemium {
  background: #3e2723;
  color: #ff9800;
}
[data-theme="dark"] .site-card .site-badge.paid {
  background: #3b1e1e;
  color: #ef5350;
}
.site-card .site-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.site-card .site-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.site-card .site-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--primary-light);
  color: var(--primary);
}
.site-card .site-url {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
  word-break: break-all;
  opacity: 0.7;
}

/* 搜索结果 */
.search-results {

}
.search-results .result-count {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;

.no-results .emoji {

  margin-bottom: 12px;

/* 面包屑 */
.breadcrumb {

  color: var(--text-secondary);
  margin-bottom: 20px;
}
.breadcrumb a {
  color: var(--primary);
  text-decoration: none;
  cursor: pointer;

/* 热门标签 */
.hot-tags {

  gap: 8px;
  margin-bottom: 24px;

  cursor: pointer;
  transition: 0.2s;
}
.hot-tag:hover {

  color: var(--primary);

/* 页脚 */

  padding: 40px 20px;
  font-size: 13px;
  color: var(--text-secondary);
}
.footer a {

  text-decoration: none;
}

@media (max-width: 768px) {
  .navbar { padding: 0 12px; gap: 8px; }
  .navbar .logo { font-size: 16px; }
  .navbar .stats { display: none; }

  .category-card .cat-icon { width: 36px; height: 36px; font-size: 18px; }
  .sites-grid { grid-template-columns: 1fr; gap: 12px; }
}

/* 动画 */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.page.active { animation: fadeIn 0.3s ease; }
.site-card { animation: fadeIn 0.3s ease; }

/* 管理后台入口 */

.admin-link:hover { transform: scale(1.1); }

        { name: 'Freepik', url: 'https://www.freepik.com', desc: '免费矢量图、PSD素材和摄影图片', tags: ['免费试用', '素材'], free: 'freemium' },
        { name: 'Remove.bg', url: 'https://www.remove.bg', desc: 'AI一键免费抠图工具，5秒出图', tags: ['免费试用', '抠图'], free: 'freemium' },
        { name: 'TinyPNG', url: 'https://tinypng.com', desc: '免费在线图片压缩工具，PNG/WEBP', tags: ['免费', '压缩'], free: 'freemium' },
        { name: 'MasterGo', url: 'https://mastergo.com', desc: '国产UI设计协作工具，免费使用', tags: ['免费', 'UI', '协作'], free: 'freemium' }
      ]
    }
  ]
};

// ====== 逻辑 ======
let allSites = [];
let searchTimer = null;

function init() {
  // 统计总数
  let total = 0;
  SITE_DATA.categories.forEach(cat => total += cat.sites.length);
  document.getElementById('totalCount').textContent = total;
  document.getElementById('updateTime').textContent = SITE_DATA.updateTime;
  document.getElementById('stats').textContent = `${total}+ 工具 | ${SITE_DATA.categories.length} 分类`;

  // 扁平化所有站点用于搜索
  SITE_DATA.categories.forEach(cat => {
    cat.sites.forEach(s => allSites.push({ ...s, categoryName: cat.name }));
  });

  // 渲染分类
  renderCategories();

  // 渲染热门标签
  renderHotTags();

  // 恢复主题
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀';
  }
}

function renderCategories() {
  const grid = document.getElementById('categoryGrid');
  grid.innerHTML = SITE_DATA.categories.map(cat => `
    <div class="category-card" onclick="showCategory('${cat.id}')">
      <div class="cat-icon ${cat.grad}">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-desc">${cat.desc}</div>
      <div class="cat-count">${cat.sites.length}个</div>
    </div>
  `).join('');
}

function renderHotTags() {
  const tagSet = new Set();
  SITE_DATA.categories.forEach(cat => {
    cat.sites.forEach(s => {
      s.tags.forEach(t => {
        if (t === '免费') tagSet.add('免费工具');
        else if (t === '免费试用') tagSet.add('免费试用');
        else tagSet.add(t);
      });
    });
  });
  const hotTags = ['免费工具', 'AI聊天', 'AI写作', 'AI绘画', 'PPT', '编程', '设计', '论文', '办公', '比价'];
  document.getElementById('hotTags').innerHTML = hotTags.map(t =>
    `<div class="hot-tag" onclick="document.getElementById('searchInput').value='${t}';handleSearch('${t}')">${t}</div>`
  ).join('');
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  if (pageId === 'home') {
    document.getElementById('searchInput').value = '';
  }
  window.scrollTo(0, 0);
}

function showCategory(catId) {
  const cat = SITE_DATA.categories.find(c => c.id === catId);
  if (!cat) return;
  document.getElementById('breadcrumbCat').textContent = cat.name;
  document.getElementById('catDetailName').textContent = cat.name;
  document.getElementById('catDetailDesc').textContent = cat.desc;
  const iconEl = document.getElementById('catDetailIcon');
  iconEl.className = 'cat-icon ' + cat.grad;
  iconEl.textContent = cat.emoji;
  document.getElementById('sitesGrid').innerHTML = cat.sites.map(s => renderSiteCard(s)).join('');
  showPage('category');
}

function renderSiteCard(s) {
  const badgeMap = { free: '免费', freemium: '免费试用', paid: '付费' };
  const badgeClass = s.free || 'freemium';
  const badgeText = badgeMap[badgeClass] || '免费试用';
  const tagsHtml = s.tags.map(t => `<span class="site-tag">${t}</span>`).join('');
  return `
    <a class="site-card" href="${s.url}" target="_blank" rel="noopener">
      <div class="site-header">
        <span class="site-name">${s.name}</span>
        <span class="site-badge ${badgeClass}">${badgeText}</span>
      </div>
      <div class="site-desc">${s.desc}</div>
      <div class="site-tags">${tagsHtml}</div>
      <div class="site-url">${s.url}</div>
    </a>
  `;
}

function handleSearch(query) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (!query || query.trim() === '') {
      if (document.getElementById('page-search').classList.contains('active')) {
        showPage('home');
      }
      return;
    }
    const q = query.trim().toLowerCase();
    const results = allSites.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      s.tags.some(t => t.toLowerCase().includes(q)) ||
      s.categoryName.toLowerCase().includes(q)
    );
    document.getElementById('resultCount').textContent = `找到 ${results.length} 个结果`;
    if (results.length === 0) {
      document.getElementById('searchResults').innerHTML = `
        <div class="no-results">
          <div class="emoji">🔍</div>
          <p>没有找到相关工具，试试其他关键词？</p>
        </div>
      `;
    } else {
      document.getElementById('searchResults').innerHTML = results.map(s => renderSiteCard(s)).join('');
    }
    showPage('search');
  }, 200);
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  if (current === 'dark') {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', 'light');
    document.querySelector('.theme-toggle').textContent = '🌙';
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀';
  }
}

init();
</script>
</body>
</html>
